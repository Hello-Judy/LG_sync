server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    # Serve the index.html file for all requests, allowing the React Router to handle routing on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Add caching headers for static assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}